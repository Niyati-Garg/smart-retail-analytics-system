<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Analytics Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body class="dark-mode">
  <header class="text-center py-3">
    
  </header>

  <div class="toggle-container">
    <input type="checkbox" id="darkModeToggle" checked />
  </div>

  <div id="welcomeScreen" class="fullscreen-center">
    <div class="card p-5">
      <h2 class="text-center mb-4 fw-bold fs-3">Welcome to Customer Analytics</h2>
      <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="video" multiple accept="video/mp4,video/mov" class="form-control form-control-lg" required />
        <button type="submit" class="btn btn-primary mt-4 w-100 btn-lg fw-bold">Upload & Process</button>
      </form>
    </div>
  </div>

  <div id="processing" class="fullscreen-center" style="display:none;">
    <div class="spinner-border text-primary" role="status" style="width: 4rem; height: 4rem;">
      <span class="visually-hidden">Processing video data. Please wait...</span>
    </div>
  </div>

  <div class="container py-5" style="display:none;" id="mainContent">
    <h1 class="text-center mb-4">Customer Analytics Dashboard</h1>

    <div class="card p-4 mt-4">
      <h4>Select Analysis Range</h4>
      <select id="rangeSelector" class="form-select w-50" onchange="loadSession()">
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
      </select>
    </div>

    <div class="card p-4 mt-4">
      <h4>Time Spent per Visitor</h4>
      <canvas id="visitorTimeChart"></canvas>
    </div>
    <div class="card p-4 mt-4">
      <h4>Time Spent per Zone</h4>
      <canvas id="zoneTimeChart"></canvas>
    </div>
  </div>

  <script>
    let visitorChart, zoneChart;

    function loadSession() {
      const range = document.getElementById("rangeSelector").value;
      fetch(`/api/summary?range=${range}`)
        .then(res => res.text())
        .then(folder => updateDashboard(folder));
    }

   function updateDashboard(folder) {
      
      fetch(`/static/merged_global_visitors.csv`)
        .then(res => res.ok ? res.text() : Promise.reject("CSV not found"))
        .then(csv => {
          const results = Papa.parse(csv, { header: true });
          const data = results.data;

          const visitorLabels = [];
          const visitorDurations = [];
          const zoneTotals = {};

          data.forEach(row => {
            if (!row["Global ID"] || isNaN(parseFloat(row["Total Time"]))) return;
            visitorLabels.push("Visitor " + row["Global ID"]);
            visitorDurations.push(parseFloat(row["Total Time"]));

            Object.keys(row).forEach(key => {
              if (key.startsWith("Zone_")) {
                zoneTotals[key] = (zoneTotals[key] || 0) + parseFloat(row[key] || 0);
              }
            });
          });

          if (visitorChart) visitorChart.destroy();
          visitorChart = new Chart(document.getElementById("visitorTimeChart"), {
            type: "bar",
            data: {
              labels: visitorLabels,
              datasets: [{ label: "Time (s)", data: visitorDurations, backgroundColor: "rgba(54, 162, 235, 0.6)" }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });

          if (zoneChart) zoneChart.destroy();
          zoneChart = new Chart(document.getElementById("zoneTimeChart"), {
            type: "bar",
            data: {
              labels: Object.keys(zoneTotals),
              datasets: [{ label: "Total Time (s)", data: Object.values(zoneTotals), backgroundColor: "rgba(255, 99, 132, 0.6)" }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
          });

          document.getElementById("processing").style.display = "none";
          document.getElementById("welcomeScreen").style.display = "none";
          document.getElementById("mainContent").style.display = "block";
        })
        .catch(err => console.error("Dashboard update failed:", err));
    }

    window.onload = () => {
      const form = document.getElementById("uploadForm");
      form.addEventListener("submit", () => {
        document.getElementById("welcomeScreen").style.display = "none";
        document.getElementById("processing").style.display = "flex";
      });

      fetch("/api/summary?range=today")
        .then(res => res.ok ? res.text() : null)
        .then(folder => {
          if (folder && folder !== "No session yet" && folder !== "No session available") {
            updateDashboard(folder.trim());
          } else {
            document.getElementById("welcomeScreen").style.display = "block";
          }
        })
        .catch(err => {
          console.error("Failed to load session:", err);
          document.getElementById("welcomeScreen").style.display = "block";
        });

      const savedTheme = localStorage.getItem("theme");
      if (savedTheme === "light") {
        document.body.classList.remove("dark-mode");
        document.body.classList.add("light-mode");
        document.getElementById("darkModeToggle").checked = false;
      }

      const toggle = document.getElementById("darkModeToggle");
      toggle.addEventListener("change", () => {
        const isDark = toggle.checked;
        document.body.classList.toggle("dark-mode", isDark);
        document.body.classList.toggle("light-mode", !isDark);
        localStorage.setItem("theme", isDark ? "dark" : "light");
      });
    }
  </script>
</body>
</html>
